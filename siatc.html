<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{
    --bg:#F1F5F9; --panel:#fff; --ink:#1E293B; --muted:#64748B; --line:#E2E8F0;
    --brain:#DD5510; --ai:#6E55D6; --aiLight:#8C78E0; --aiDark:#3B1D7F;
    --font:'Montserrat','Segoe UI',-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);line-height:1.45}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
  header.app h1{font-size:25px;font-weight:800;letter-spacing:-0.01em;margin:0}
  header.app .full{color:var(--muted);font-size:13.5px;margin:3px 0 0}
  header.app{border-bottom:2px solid var(--ink);padding-bottom:14px}
  .intro{color:var(--muted);font-size:14px;margin:14px 0 22px;max-width:780px}
  .grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,0.95fr);gap:28px;align-items:start}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  @media(max-width:520px){.meta{grid-template-columns:1fr}}
  .field label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-family:var(--font);font-size:14px;background:#fff}
  .field input:focus{outline:2px solid var(--ai);outline-offset:1px;border-color:var(--ai)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;margin-bottom:11px;position:relative;overflow:hidden;transition:opacity .15s}
  .card.na{opacity:.5}
  .card .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
  .rhead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .rname{font-size:15px;font-weight:700;margin:0}
  .rdef{font-size:12.5px;color:var(--muted);margin:2px 0 4px}
  .ex{font-size:11.5px;color:#94A3B8;margin:0 0 11px}
  .ex b{color:var(--muted);font-weight:700}
  .na-toggle{flex:none;border:1px solid var(--line);background:#fff;border-radius:6px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;font-family:var(--font)}
  .na-toggle:hover{border-color:#CBD5E1}
  .na-toggle:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .extent{display:flex;gap:8px;margin-bottom:10px}
  .extent button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:7px 6px;cursor:pointer;font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--muted);transition:.12s}
  .extent button .lvl{display:block;font-size:18px;font-weight:800;line-height:1.1}
  .extent button:hover{border-color:#CBD5E1}
  .extent button[aria-pressed="true"]{color:#fff}
  .extent button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .detail{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:520px){.detail{grid-template-columns:1fr}}
  .detail input{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:13px}
  .detail input:focus{outline:2px solid var(--ai);outline-offset:1px;border-color:var(--ai)}
  .detail .lab{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
  .na-msg{font-size:12px;color:var(--muted);font-style:italic}
  .right{position:sticky;top:18px}
  .figbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px}
  .figbox svg{width:100%;height:auto;display:block}
  .legend{display:flex;justify-content:center;gap:18px;font-size:13px;font-weight:600;margin:8px 0 2px;color:var(--ink)}
  .legend .sw{display:inline-block;width:14px;height:11px;border-radius:2px;margin-right:6px;vertical-align:middle}
  .caption{text-align:center;color:var(--muted);font-size:12.5px;margin:4px 4px 2px}
  .stmt{font-style:italic;color:#475569;font-size:11.5px;text-align:center;margin:10px 14px 0;line-height:1.5}
  table.tbl{width:100%;border-collapse:collapse;margin-top:18px;font-size:12.5px;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table.tbl th{background:#111827;color:#fff;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  table.tbl td{padding:8px 10px;border-top:1px solid var(--line);vertical-align:top}
  table.tbl tr.skip td{color:#94A3B8}
  table.tbl td .sq{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px;vertical-align:middle}
  .rolecell{font-weight:700}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .actions button{flex:1;min-width:120px;border:none;border-radius:9px;padding:11px 12px;cursor:pointer;font-family:var(--font);font-weight:700;font-size:13px;background:var(--ink);color:#fff}
  .actions button.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .actions button:focus-visible{outline:2px solid var(--ai);outline-offset:2px}
  footer.app{margin-top:34px;border-top:1px solid var(--line);padding-top:14px;color:var(--muted);font-size:11.5px;line-height:1.6;max-width:920px}
  footer.app a{color:#2451CB}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>

// Merge structural metadata with the active language's role text.
function buildRoles(t){ return ROLE_META.map(m => Object.assign({}, m, t.roles[m.id])); }

// ---- geometry (matches the original sIfA figure space) ----
const CX = 310, CY = 310, R1 = 74, R2 = 148, LABELR = 214;

function angleFor(j, n){ return (-90 + j*(360/n)) * Math.PI/180; }
function pointFor(j, n, extent){ const a=angleFor(j,n), r=(extent/2)*R2; return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
function axisEnd(j, n){ const a=angleFor(j,n); return [CX+R2*Math.cos(a), CY+R2*Math.sin(a)]; }
function labelPos(j, n){ const a=angleFor(j,n); return [CX+LABELR*Math.cos(a), CY+LABELR*Math.sin(a), Math.cos(a)]; }

function smoothClosed(pts){
  const n=pts.length; if(n<3) return "";
  let d="M"+pts[0][0].toFixed(1)+","+pts[0][1].toFixed(1)+" ";
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n],p1=pts[i],p2=pts[(i+1)%n],p3=pts[(i+2)%n];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+="C"+c1x.toFixed(1)+","+c1y.toFixed(1)+" "+c2x.toFixed(1)+","+c2y.toFixed(1)+" "+p2[0].toFixed(1)+","+p2[1].toFixed(1)+" ";
  }
  return d+"Z";
}
function diamond(x,y,fill){ const s=11; return '<path d="M'+x+','+(y-s)+' L'+(x+s*0.42)+','+(y-1.4)+' L'+(x+s)+','+y+' L'+(x+s*0.42)+','+(y+1.4)+' L'+x+','+(y+s)+' L'+(x-s*0.42)+','+(y+1.4)+' L'+(x-s)+','+y+' L'+(x-s*0.42)+','+(y-1.4)+' Z" fill="'+fill+'" stroke="white" stroke-width="1.4" stroke-opacity="0.9"/>'; }

function activeRoles(roles,data){ return roles.filter(r=>!data[r.id].na); }

function buildFigure(roles,data){
  const ff="font-family:'Montserrat','Segoe UI',Arial,sans-serif";
  const gyri=ART.gyri.map(d=>'<path d="'+d+'"/>').join("");
  const wob=ART.wobble.map(d=>'<path d="'+d+'" fill="none" stroke="white" stroke-opacity="0.27" stroke-width="0.95"/>').join("");
  const act=activeRoles(roles,data), n=act.length;

  let axes="",labels="",markers="";
  const pts=act.map((r,j)=>pointFor(j,n,data[r.id].extent));
  act.forEach((r,j)=>{
    const [ex,ey]=axisEnd(j,n);
    axes+='<line x1="'+CX+'" y1="'+CY+'" x2="'+ex.toFixed(1)+'" y2="'+ey.toFixed(1)+'" stroke="white" stroke-opacity="0.22" stroke-width="0.7"/>';
    const [lx,ly,c]=labelPos(j,n);
    const anchor=c>0.3?"start":(c<-0.3?"end":"middle");
    const ll=r.lines, startY=ly-(ll.length-1)*8;
    ll.forEach((ln,k)=>{ labels+='<text x="'+lx.toFixed(1)+'" y="'+(startY+k*15).toFixed(1)+'" text-anchor="'+anchor+'" dominant-baseline="middle" style="'+ff+'" font-size="14.5" font-weight="700" fill="'+r.accent+'">'+esc(ln)+'</text>'; });
    if(data[r.id].extent>0) markers+=diamond(pts[j][0].toFixed(1),pts[j][1].toFixed(1),data[r.id].extent>=2?"#3B1D7F":"#8C78E0");
  });

  let aiLayers="";
  if(n>=3){
    const blob=smoothClosed(pts);
    aiLayers='<g clip-path="url(#brainClip)">'+
      '<path d="'+blob+'" fill="#8C78E0" fill-opacity="0.72" filter="url(#blobBlur)"/>'+
      '<path d="'+blob+'" fill="#3B1D7F" fill-opacity="0.50" filter="url(#blobBlur)"/></g>'+
      '<path d="'+blob+'" clip-path="url(#brainClip)" fill="#6E55D6" fill-opacity="0.55" stroke="#5341BC" stroke-width="5" stroke-opacity="0.9"/>';
  }

  return '<svg viewBox="-25 0 670 620" xmlns="http://www.w3.org/2000/svg" style="'+ff+'">'+
    '<defs><clipPath id="brainClip"><path d="'+ART.brain+'"/></clipPath>'+
    '<filter id="blobBlur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter></defs>'+
    '<path d="'+ART.brain+'" fill="#DD5510" fill-opacity="0.72" stroke="none"/>'+
    '<g clip-path="url(#brainClip)" fill="none" stroke="white" stroke-opacity="0.30" stroke-width="1.5" stroke-linecap="round">'+gyri+'</g>'+
    '<path d="'+ART.brain+'" fill="none" stroke="#5D1F08" stroke-width="1.8"/>'+
    '<g clip-path="url(#brainClip)">'+wob+axes+'</g>'+
    aiLayers+
    '<circle cx="310" cy="310" r="74" fill="none" stroke="#A53807" stroke-opacity="0.92" stroke-width="2.6" stroke-dasharray="5 4"/>'+
    '<circle cx="310" cy="310" r="148" fill="none" stroke="#A53807" stroke-opacity="0.85" stroke-width="2.3" stroke-dasharray="5 4"/>'+
    '<rect x="313" y="226" width="20" height="20" rx="4" fill="rgba(0,0,0,0.38)"/><text x="323" y="237" text-anchor="middle" font-size="14" font-weight="800" fill="white">1</text>'+
    '<rect x="313" y="152" width="20" height="20" rx="4" fill="rgba(0,0,0,0.38)"/><text x="323" y="163" text-anchor="middle" font-size="14" font-weight="800" fill="white">2</text>'+
    markers+labels+'</svg>';
}

function summary(roles,data,t){
  const act=activeRoles(roles,data);
  if(act.length===0) return t.sumAllNA;
  const used=act.filter(r=>data[r.id].extent>0);
  if(used.length===0) return t.sumNoAI(act.length);
  const avg=used.reduce((s,r)=>s+data[r.id].extent,0)/used.length;
  return t.sumSome(used.length, act.length, avg.toFixed(1));
}

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function slug(s){return (s||"siatc").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,48)||"siatc";}
function download(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),1500);}
function wrapText(t,cx,y,ff,fill){
  const words=t.split(" ");let line="",lines=[];
  words.forEach(w=>{ if((line+" "+w).length>64){lines.push(line);line=w;} else line=line?line+" "+w:w; });
  if(line)lines.push(line);
  return lines.map((ln,i)=>'<text x="'+cx+'" y="'+(y+i*16)+'" text-anchor="middle" style="'+ff+'" font-size="11.5" font-style="italic" fill="'+fill+'">'+esc(ln)+'</text>').join("");
}
function wrapByWidth(str,maxWidth,fontSize){
  const maxChars=Math.max(8,Math.floor(maxWidth/(fontSize*0.58)));
  const words=String(str||"").split(" ");let line="",lines=[];
  words.forEach(w=>{ if(line && (line+" "+w).length>maxChars){lines.push(line);line=w;} else line=line?line+" "+w:w; });
  if(line)lines.push(line);
  return lines.length?lines:[""];
}
function buildExportSVG(meta,roles,data,t){
  const W=560,fig=buildFigure(roles,data),inner=fig.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'');
  const ff="font-family:'Montserrat','Segoe UI',Arial,sans-serif";
  const title=meta.title||BRAND.name;
  const M=24;
  let head="",y=14;
  wrapByWidth(title,W-2*M,20).forEach(ln=>{ y+=23; head+='<text x="'+(W/2)+'" y="'+y+'" text-anchor="middle" style="'+ff+'" font-size="20" font-weight="800" fill="#1E293B">'+esc(ln)+'</text>'; });
  y+=5;
  wrapByWidth("sIATC \u00B7 "+t.full,W-2*M,11).forEach(ln=>{ y+=14; head+='<text x="'+(W/2)+'" y="'+y+'" text-anchor="middle" style="'+ff+'" font-size="11" fill="#94A3B8">'+esc(ln)+'</text>'; });
  if(meta.author){ y+=17; head+='<text x="'+(W/2)+'" y="'+y+'" text-anchor="middle" style="'+ff+'" font-size="12" fill="#64748B">'+esc(meta.author)+'</text>'; }
  const figTop=Math.round(y+12), dy=figTop-76, H=770+dy;
  let s='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'"><rect width="'+W+'" height="'+H+'" fill="white"/>';
  s+=head;
  s+='<svg x="30" y="'+figTop+'" width="500" height="463" viewBox="-25 0 670 620">'+inner+'</svg>';
  s+='<line x1="30" y1="'+(556+dy)+'" x2="530" y2="'+(556+dy)+'" stroke="#E2E8F0"/>';
  s+='<text x="'+(W/2)+'" y="'+(576+dy)+'" text-anchor="middle" style="'+ff+'" font-size="12.5" fill="#64748B">'+esc(t.expScale)+'</text>';
  s+='<text x="'+(W/2)+'" y="'+(594+dy)+'" text-anchor="middle" style="'+ff+'" font-size="12.5" fill="#334155">'+esc(summary(roles,data,t))+'</text>';
  s+='<rect x="150" y="'+(608+dy)+'" width="20" height="14" rx="2" fill="#DD5510" opacity="0.72"/><text x="178" y="'+(620+dy)+'" style="'+ff+'" font-size="13" font-weight="600" fill="#334155">'+esc(t.legendOuter)+'</text>';
  s+='<rect x="320" y="'+(608+dy)+'" width="20" height="14" rx="2" fill="#6E55D6" opacity="0.72"/><text x="348" y="'+(620+dy)+'" style="'+ff+'" font-size="13" font-weight="600" fill="#334155">'+esc(t.legendCentre)+'</text>';
  s+='<text x="'+(W/2)+'" y="'+(644+dy)+'" text-anchor="middle" style="'+ff+'" font-size="11.5" font-style="italic" fill="#475569">'+esc(t.expAxis)+'</text>';
  s+='<line x1="30" y1="'+(658+dy)+'" x2="530" y2="'+(658+dy)+'" stroke="#E2E8F0"/>';
  s+=wrapText(t.statement,W/2,678+dy,ff,"#334155");
  s+='<text x="'+(W/2)+'" y="'+(742+dy)+'" text-anchor="middle" style="'+ff+'" font-size="10" fill="#94A3B8">'+esc(t.expBasedOn)+'</text>';
  return { svg:s+'</svg>', W:W, H:H };
}
function exportSVG(meta,roles,data,t){ const r=buildExportSVG(meta,roles,data,t); download(new Blob([r.svg],{type:"image/svg+xml"}), slug(meta.title||"siatc")+".svg"); }
function exportPNG(meta,roles,data,t){
  const r=buildExportSVG(meta,roles,data,t), W=r.W, H=r.H;
  const img=new Image();
  img.onload=function(){ const sc=2,c=document.createElement("canvas");c.width=W*sc;c.height=H*sc;const ctx=c.getContext("2d");ctx.scale(sc,sc);ctx.fillStyle="#fff";ctx.fillRect(0,0,W,H);ctx.drawImage(img,0,0,W,H);c.toBlob(b=>download(b,slug(meta.title||"siatc")+".png"),"image/png"); };
  img.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(r.svg)));
}
function exportJSON(meta,roles,data,t,lang){
  const obj={ tool:"sIATC", basedOn:"sIfA Tool (Schomerus/Busara), Apache-2.0", version:1, kind:"sIATC-statement", lang:lang,
    savedAt:new Date().toISOString(), title:meta.title||"", author:meta.author||"",

  download(new Blob([JSON.stringify(obj,null,2)],{type:"application/json"}), slug(meta.title||"siatc")+".siatc.json");
}

function App(){
  const [lang,setLang]=useState(()=>{ const n=(typeof navigator!=="undefined"&&navigator.language||"en").toLowerCase(); return n.indexOf("pt")===0?"pt":n.indexOf("es")===0?"es":"en"; });
  const t=STRINGS[lang];
  const roles=useMemo(()=>buildRoles(t),[lang]);

  const [meta,setMeta]=useState({title:"",author:""});
  const [data,setData]=useState(()=>{const o={};ROLE_META.forEach(r=>o[r.id]={extent:0,tool:"",note:"",na:false});return o;});
  const setExtent=(id,v)=>setData(d=>({...d,[id]:{...d[id],extent:v}}));
  const setField=(id,k,v)=>setData(d=>({...d,[id]:{...d[id],[k]:v}}));
  const toggleNA=(id)=>setData(d=>({...d,[id]:{...d[id],na:!d[id].na}}));
  const figure=useMemo(()=>buildFigure(roles,data),[roles,data]);

  useEffect(()=>{ document.documentElement.lang=t.htmlLang; document.title="sIATC \u2014 "+t.full; },[lang]);

  return (
    <div className="wrap">
      <header className="app" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:"12px",flexWrap:"wrap"}}>
        <div>
          <h1>{BRAND.name}</h1>
          <p className="full">{t.full}</p>
        </div>
        <div className="langtoggle" role="group" aria-label="Language">
          {Object.keys(STRINGS).map(code=>(
            <button key={code} type="button" aria-pressed={lang===code} onClick={()=>setLang(code)}
              style={{border:"1.5px solid "+(lang===code?"#6E55D6":"#E2E8F0"),background:lang===code?"#6E55D6":"#fff",color:lang===code?"#fff":"#64748B",borderRadius:"7px",padding:"5px 11px",marginLeft:"6px",fontFamily:"inherit",fontSize:"12px",fontWeight:700,letterSpacing:".03em",cursor:"pointer"}}>
              {STRINGS[code].label}
            </button>
          ))}
        </div>
      </header>
      <p className="intro" dangerouslySetInnerHTML={{__html:t.intro}}/>

      <div className="grid">
        <div>
          <div className="meta">
            <div className="field"><label htmlFor="t">{t.pieceLabel}</label><input id="t" placeholder={t.piecePh} value={meta.title} onChange={e=>setMeta(m=>({...m,title:e.target.value}))}/></div>
            <div className="field"><label htmlFor="a">{t.byLabel}</label><input id="a" placeholder={t.byPh} value={meta.author} onChange={e=>setMeta(m=>({...m,author:e.target.value}))}/></div>
          </div>

          {roles.map(r=>{
            const d=data[r.id];
            return (
              <div className={"card"+(d.na?" na":"")} key={r.id}>
                <div className="bar" style={{background:r.accent}}></div>
                <div className="rhead">
                  <div>
                    <p className="rname" style={{color:r.accent}}>{r.short}</p>
                    <p className="rdef">{r.def}</p>
                  </div>
                  <button className="na-toggle" aria-pressed={d.na} onClick={()=>toggleNA(r.id)}>{d.na?t.naInclude:t.naExclude}</button>
                </div>
                {d.na ? (
                  <p className="na-msg">{t.naMsg}</p>
                ) : (
                  <React.Fragment>
                    <p className="ex"><b>{t.egLabel}</b> {r.ex}</p>
                    <div className="extent" role="group" aria-label={t.extentAria+r.short}>
                      {[0,1,2].map(v=>(
                        <button key={v} aria-pressed={d.extent===v}
                          style={d.extent===v?{background:r.accent,borderColor:r.accent}:{}}
                          onClick={()=>setExtent(r.id,v)}>
                          <span className="lvl">{v}</span>{t.extentLabels[v]}
                        </button>
                      ))}
                    </div>
                    {d.extent>0 && (
                      <div className="detail">
                        <div><div className="lab">{t.toolLabel}</div><input placeholder={t.toolPh} value={d.tool} onChange={e=>setField(r.id,"tool",e.target.value)}/></div>
                        <div><div className="lab">{t.noteLabel}</div><input placeholder={t.notePh} value={d.note} onChange={e=>setField(r.id,"note",e.target.value)}/></div>
                      </div>
                    )}
                  </React.Fragment>
                )}
              </div>
            );
          })}
        </div>

        <div className="right">
          <div className="figbox"><div dangerouslySetInnerHTML={{__html:figure}}/></div>
          <div className="legend"><span><span className="sw" style={{background:"#DD5510",opacity:.72}}></span>{t.legendOuter}</span><span><span className="sw" style={{background:"#6E55D6",opacity:.72}}></span>{t.legendCentre}</span></div>
          <div className="caption">{summary(roles,data,t)}</div>
          <p className="stmt">{t.statement}</p>

          <table className="tbl">
            <thead><tr><th>{t.thStage}</th><th>{t.thExtent}</th><th>{t.thHow}</th></tr></thead>
            <tbody>
              {roles.map(r=>{
                const d=data[r.id];
                if(d.na) return (<tr className="skip" key={r.id}><td className="rolecell">{r.short}</td><td>{t.na}</td><td>{t.dash}</td></tr>);
                return (
                  <tr key={r.id}>
                    <td className="rolecell" style={{color:r.accent}}>{r.short}</td>
                    <td><span className="sq" style={{background:d.extent>=1?"#8C78E0":"#E2E8F0"}}></span><span className="sq" style={{background:d.extent>=2?"#3B1D7F":"#E2E8F0"}}></span>&nbsp;{d.extent}</td>
                    <td>{d.extent>0 ? ([d.note,d.tool].filter(Boolean).join(" "+t.dash+" ")||t.dash) : t.dash}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>

          <div className="actions">
            <button onClick={()=>exportSVG(meta,roles,data,t)}>{t.btnSVG}</button>
            <button onClick={()=>exportPNG(meta,roles,data,t)}>{t.btnPNG}</button>
            <button className="ghost" onClick={()=>exportJSON(meta,roles,data,t,lang)}>{t.btnJSON}</button>
          </div>
        </div>
      </div>

      <footer className="app" dangerouslySetInnerHTML={{__html:t.footer}}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
